name: Build and Deploy AppImage

on:
  push:
    branches:
      - main # Or the branch you want to trigger this workflow on

jobs:
  build_and_push_appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Download blanket-anylinux.sh
        run: wget https://github.com/iowa42069/blanket-appimage/raw/refs/heads/main/blanket-anylinux.sh -O blanket-anylinux.sh

      - name: Make blanket-anylinux.sh executable
        run: chmod +x blanket-anylinux.sh

      - name: Run build script
        run: bash blanket-anylinux.sh

      - name: Find the AppImage
        # IMPORTANT: You still need to customize this step to find your AppImage.
        # The script will create an AppImage, but you need to tell the workflow
        # how to locate it.
        #
        # Example: If your script always outputs the AppImage to 'dist/my-app.AppImage'
        # run: echo "APPIMAGE_FOUND=true" >> $GITHUB_ENV && echo "APPIMAGE_NAME=dist/my-app.AppImage" >> $GITHUB_ENV
        #
        # Example: If you need to find it by pattern (e.g., ends with .AppImage)
        run: |
          APPIMAGE_FILE=$(find . -name "*.AppImage" -print -quit)
          if [ -n "$APPIMAGE_FILE" ]; then
            echo "APPIMAGE_FOUND=true" >> $GITHUB_ENV
            echo "APPIMAGE_NAME=$APPIMAGE_FILE" >> $GITHUB_ENV
            echo "Found AppImage: $APPIMAGE_FILE"
          else
            echo "Error: AppImage not found after running the script."
            exit 1
          fi

      - name: Commit and push AppImage
        if: env.APPIMAGE_FOUND == 'true'
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ${{ env.APPIMAGE_NAME }}
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update AppImage"
            git push
          fi
